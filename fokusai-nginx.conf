server {
    listen 80;
    listen [::]:80;
    
    server_name test.nemesisstudio.fun;
    
    # Logging
    access_log /var/log/nginx/nemesis_access.log;
    error_log /var/log/nginx/nemesis_error.log;
    
    # Client body size (untuk upload file)
    client_max_body_size 100M;
    
    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }
    
    location /api/me/plan/stream {
        proxy_pass http://localhost:8790;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Streaming friendly timeouts
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    location / {
        proxy_pass http://localhost:8790;
        proxy_http_version 1.1;
        
        # WebSocket support untuk Next.js hot reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Headers untuk proxy
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Gzip compression untuk performa
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
}
